# tint2 macOS-style dock — fully transparent background
# Requires: feh wallpaper set BEFORE tint2 starts

# Background 1: for tooltip
rounded = 4
border_width = 0
border_sides =
background_color = #222222 80
border_color = #000000 0

# Panel
panel_items = L
panel_size = 50% 48
panel_shrink = 1
panel_position = bottom center horizontal
panel_margin = 0 0
panel_padding = 4 2 6
panel_background_id = 0
panel_layer = top
panel_dock = 0
panel_monitor = all
wm_menu = 0
disable_transparency = 1

# Strut
strut_policy = none

# Autohide
autohide = 1
autohide_show_timeout = 0.0
autohide_hide_timeout = 0.5
autohide_height = 2

# Launcher
launcher_padding = 2 2 6
launcher_background_id = 0
launcher_icon_background_id = 0
launcher_icon_size = 40
launcher_icon_asb = 100 0 0
launcher_tooltip = 1

# Apps in dock
launcher_item_app = /usr/share/applications/firefox-esr.desktop
launcher_item_app = /usr/share/applications/zzzfm.desktop
launcher_item_app = /usr/share/applications/roxterm.desktop
launcher_item_app = /usr/share/applications/leafpad.desktop
launcher_item_app = /usr/share/applications/libreoffice-writer.desktop
launcher_item_app = /usr/share/applications/libreoffice-calc.desktop
launcher_item_app = /usr/share/applications/libreoffice-impress.desktop
launcher_item_app = /usr/share/applications/synaptic.desktop
launcher_item_app = /usr/share/applications/trash.desktop

# Tooltip
tooltip_padding = 4 4
tooltip_show_timeout = 0.5
tooltip_hide_timeout = 0.2
tooltip_background_id = 1
tooltip_font = Sans 10
tooltip_font_color = #dddddd 100
