# tint2 macOS-style bottom dock for antiX + IceWM
# Launch with: G_SLICE=always-malloc tint2 -c ~/.config/tint2/tint2-dock.conf
# Resource usage: ~24MB RAM, ~0.2% CPU (event-based autohide = 0 CPU when hidden)

# Panel
panel_items = L
panel_size = 50% 48
panel_shrink = 1
panel_position = bottom center horizontal
panel_margin = 0 0
panel_padding = 8 4 4
panel_background_id = 1
panel_layer = top
panel_dock = 0
panel_monitor = all
wm_menu = 0

# Strut — CRITICAL: must be none to prevent window resize on autohide
# WARNING: tint2 17.0.1 segfaults with strut_policy=none unless G_SLICE=always-malloc is set
strut_policy = none

# Autohide — X11 event-based (EnterNotify/LeaveNotify), zero CPU when hidden
autohide = 1
autohide_show_timeout = 0.0
autohide_hide_timeout = 0.5
autohide_height = 2

# Background 1: semi-transparent dark panel
rounded = 12
border_width = 1
border_sides = TBLR
background_color = #2d2d2d 85
border_color = #555555 50
background_color_hover = #3d3d3d 85
border_color_hover = #666666 50

# Background 2: launcher icon hover
rounded = 8
border_width = 0
background_color = #ffffff 20
border_color = #ffffff 0

# Launcher
launcher_padding = 4 4 8
launcher_background_id = 0
launcher_icon_background_id = 0
launcher_icon_size = 36
launcher_icon_asb = 100 0 0
launcher_tooltip = 1

# Apps in dock — customize these to your needs
launcher_item_app = /usr/share/applications/firefox-esr.desktop
launcher_item_app = /usr/share/applications/zzzfm.desktop
launcher_item_app = /usr/share/applications/roxterm.desktop
launcher_item_app = /usr/share/applications/leafpad.desktop
launcher_item_app = /usr/share/applications/libreoffice-writer.desktop
launcher_item_app = /usr/share/applications/libreoffice-calc.desktop
launcher_item_app = /usr/share/applications/libreoffice-impress.desktop
launcher_item_app = /usr/share/applications/synaptic.desktop

# Tooltip
tooltip_padding = 4 4
tooltip_show_timeout = 0.5
tooltip_hide_timeout = 0.2
tooltip_background_id = 1
tooltip_font = Sans 10
tooltip_font_color = #dddddd 100
